<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='16' fill='none' stroke='%23f59e0b' stroke-width='2.5' opacity='0.55'/%3E%3Ccircle cx='32' cy='32' r='6' fill='%23fef3c7'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%23f59e0b'/%3E%3C/svg%3E" />
    <title>Laniakea Colonization Explorer</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RL73QNPZPK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-RL73QNPZPK');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Animated supernova favicon — a shock-wave ring expands and fades from a pulsing
      // bright core. Href is swapped on a 120ms tick (Chrome won't animate SVG natively).
      (function () {
        var link = document.getElementById("favicon");
        if (!link) return;
        var COLOR = "#f59e0b";
        var TAU = Math.PI * 2;
        function frame(t) {
          var cycle = ((t * 0.4) % TAU) / TAU;          // 0..1, shock-wave progress
          var r = (4 + cycle * 24).toFixed(1);
          var op = (1 - cycle).toFixed(2);
          var coreR = (5 + Math.sin(t * 1.4) * 1.8).toFixed(2);
          var svg =
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
              '<circle cx="32" cy="32" r="' + r + '" fill="none" stroke="' + COLOR + '" stroke-width="2.5" opacity="' + op + '"/>' +
              '<circle cx="32" cy="32" r="' + coreR + '" fill="#fef3c7"/>' +
              '<circle cx="32" cy="32" r="3" fill="' + COLOR + '"/>' +
            '</svg>';
          return "data:image/svg+xml," + encodeURIComponent(svg);
        }
        var t = 0;
        link.href = frame(t);
        setInterval(function () {
          t += 0.5;
          link.href = frame(t);
        }, 120);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
